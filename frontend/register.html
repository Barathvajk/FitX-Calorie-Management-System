<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FITX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:520px;">
    <div class="auth-logo">
      <div class="logo-icon">FX</div>
      <h1>FIT<span>X</span></h1>
      <p>Create your free account and start tracking</p>
    </div>

    <form id="registerForm">
      <div class="grid-2" style="gap:12px;">
        <div class="form-group" style="margin-bottom:12px;">
          <label>Full Name</label>
          <input class="form-control" type="text" id="name" placeholder="John Doe" required>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Email</label>
          <input class="form-control" type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Password</label>
          <input class="form-control" type="password" id="password" placeholder="Min 6 characters" required>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Age</label>
          <input class="form-control" type="number" id="age" placeholder="25" min="10" max="100">
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Height (cm)</label>
          <input class="form-control" type="number" id="height" placeholder="170">
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Weight (kg)</label>
          <input class="form-control" type="number" id="weight" placeholder="70">
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Gender</label>
          <select class="form-control" id="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:12px;">
          <label>Fitness Goal</label>
          <select class="form-control" id="goal">
            <option value="maintain">Maintain Weight</option>
            <option value="lose">Lose Weight</option>
            <option value="gain">Gain Muscle</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Activity Level</label>
        <select class="form-control" id="activity_level">
          <option value="1.2">Sedentary (office job, no exercise)</option>
          <option value="1.375">Lightly Active (1–3 days/week)</option>
          <option value="1.55" selected>Moderately Active (3–5 days/week)</option>
          <option value="1.725">Very Active (6–7 days/week)</option>
          <option value="1.9">Athlete (twice a day training)</option>
        </select>
      </div>
      <div id="regError" style="color:#f44336;font-size:13px;margin-bottom:10px;display:none;"></div>
      <button class="btn btn-primary btn-full" type="submit" id="regBtn">
        <span>🚀</span> Create My Account
      </button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Login here</a></p>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';

document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('regError');
  btn.disabled = true; btn.textContent = 'Creating account…';
  err.style.display = 'none';

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        age: Number(document.getElementById('age').value) || null,
        height: Number(document.getElementById('height').value) || null,
        weight: Number(document.getElementById('weight').value) || null,
        gender: document.getElementById('gender').value,
        goal: document.getElementById('goal').value,
        activity_level: parseFloat(document.getElementById('activity_level').value)
      })
    });
    const data = await res.json();
    if (res.ok) {
      alert('✅ ' + data.message);
      window.location.href = 'login.html';
    } else {
      err.textContent = data.message || 'Registration failed.';
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Cannot connect to server.';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.innerHTML = '<span>🚀</span> Create My Account';
});
</script>
</body>
</html>
